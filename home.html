<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BiggEyes Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --pink:#c2185b;
  --light:#fde6ef;
  --bg:#C5CFDF;
}
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:var(--bg)}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px
}
.logo{font-size:30px;font-weight:900;color:var(--pink)}
.header-icons{display:flex;gap:10px}
.h-icon{
  width:36px;height:36px;border-radius:50%;
  background:var(--light);color:var(--pink);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

/* PROFILE */
.profile{text-align:center;margin-top:20px}
.profile-circle{
  width:130px;height:130px;border-radius:50%;
  margin:0 auto;
  border:5px solid var(--pink);
  background:url("https://via.placeholder.com/150") center/cover;
  cursor:pointer;
}
.user-id{color:var(--pink);margin:8px 0}

.action-row{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap
}

.btn{
  background:var(--pink);
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:22px;
  cursor:pointer;
}

/* CENTER SECTION */
.media-section{
  display:flex;
  justify-content:center;
  gap:40px;
  margin:25px 0;
}

.media-col{text-align:center}

.media-grid{
  display:grid;
  grid-template-columns:repeat(2,80px);
  gap:12px;
  justify-content:center;
}

.box{
  width:80px;height:80px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  cursor:pointer;
}

.add{background:var(--pink)}
.disabled{background:#e8a3be}

/* FEED */
.feed{padding:10px}
.post{
  background:#fff;
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}
.post-media img,
.post-media video{width:100%}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:56px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #eee;
}
.nav{font-size:22px;cursor:pointer}
</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");
if(!token || token==="undefined"){
  location.replace("login.html");
}
</script>

<!-- HEADER -->
<div class="header">
  <div class="logo">BiggEyes</div>
  <div class="header-icons">
    <div class="h-icon" onclick="openGallery('story')">＋</div>
    <div class="h-icon" onclick="openGallery('photo')">🖼</div>
  </div>
</div>

<!-- PROFILE -->
<div class="profile">
  <!-- ✅ click → settings -->
  <div class="profile-circle" onclick="goPage('settings.html')"></div>
  <div class="user-id" id="uid">@user</div>

  <div class="action-row">
    <button class="btn" onclick="goPage('best.html')">BEST</button>
    <button class="btn" onclick="goPage('vip.html')">VIP</button>
    <button class="btn" onclick="goPage('follow.html')">FOLLOW</button>
  </div>
</div>

<!-- CENTER BOXES -->
<div class="media-section">

  <div class="media-col">
    <h3 style="color:#c2185b">Story</h3>
    <div class="media-grid">
      <div class="box add" onclick="openGallery('story')">Add</div>
      <div class="box disabled"></div>
    </div>
  </div>

  <div class="media-col">
    <h3 style="color:#c2185b">Photo</h3>
    <div class="media-grid">
      <div class="box add" onclick="openGallery('photo')">Add</div>
      <div class="box disabled"></div>
    </div>
  </div>

</div>

<div class="feed" id="feed"></div>

<div class="bottom-nav">
  <div class="nav" onclick="goPage('home.html')">🏠</div>
  <div class="nav" onclick="goPage('follow.html')">👥</div>
  <div class="nav" onclick="goPage('settings.html')">⚙</div>
</div>

<input type="file" id="file" hidden>

<script>
const API="https://biggeyes.onrender.com";
let currentType="photo";

function goPage(p){location.href=p}

function openGallery(type){
  currentType=type;
  const f=document.getElementById("file");
  f.accept = type==="story" ? "image/*,video/*" : "image/*";
  f.click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  if(!file) return;
  const url=URL.createObjectURL(file);

  const post=document.createElement("div");
  post.className="post";
  post.innerHTML=`
    <div class="post-media">
      ${file.type.startsWith("image")
        ? `<img src="${url}">`
        : `<video src="${url}" controls></video>`}
    </div>
  `;
  document.getElementById("feed").prepend(post);
};

fetch(API+"/api/user/profile",{
  headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(r=>r.json())
.then(d=>{
  if(d.user?.email){
    document.getElementById("uid").innerText="@"+d.user.email.split("@")[0];
  }
});

</script>

</body>
</html>
