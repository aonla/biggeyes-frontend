<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiggEyes</title>

<style>
:root{
  --pink:#c2185b;
  --light:#fde6ef;
}
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px;
}
.logo{
  font-size:26px;
  color:var(--pink);
  font-weight:bold;
}
.icons{
  display:flex;
  gap:10px;
}
.icon{
  width:36px;height:36px;
  background:var(--light);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LEFT */
.left{
  position:absolute;
  top:70px;
  left:10px;
}
.btn{
  background:var(--pink);
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:20px;
  margin-top:8px;
}

/* PROFILE */
.profile{
  text-align:center;
  margin-top:20px;
}
.dp{
  width:130px;
  height:130px;
  border-radius:50%;
  border:5px solid var(--pink);
  margin:auto;
  background:#ddd;
}
.username{
  color:var(--pink);
  margin:6px;
}

/* ROW */
.row{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

/* SCROLL */
.scroll{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}
.box{
  min-width:80px;
  height:80px;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}
.add{background:var(--pink);}
.item{background:#f3b3cc}

/* FEED */
.feed{
  padding:10px;
}
.post{
  background:#fff;
  margin-bottom:10px;
  border-radius:10px;
  overflow:hidden;
}
.post img,.post video{width:100%}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  height:55px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("token")){
  location.href="login.html";
}
</script>

<div class="header">
  <div class="logo">BiggEyes</div>
  <div class="icons">
    <div class="icon" onclick="upload('story')">+</div>
    <div class="icon" onclick="upload('photo')">🖼</div>
  </div>
</div>

<div class="left">
  <button class="btn">PASS</button><br>
  <button class="btn">MENU</button>
</div>

<div class="profile">
  <div class="dp" id="dp"></div>
  <div class="username" id="user">@user</div>

  <div class="row">
    <button class="btn">BEST</button>
    <button class="btn">VIP MODE</button>
    <button class="btn">FOLLOW</button>
    <button class="btn">MORE</button>
  </div>
</div>

<h3 style="padding-left:10px;color:#c2185b">Story</h3>
<div class="scroll" id="story">
  <div class="box add" onclick="upload('story')">Add</div>
</div>

<h3 style="padding-left:10px;color:#c2185b">Photo</h3>
<div class="scroll" id="photo">
  <div class="box add" onclick="upload('photo')">Add</div>
</div>

<div class="feed" id="feed"></div>

<div style="text-align:center;margin:20px">
  <button class="btn" onclick="logout()">Logout</button>
</div>

<div class="bottom">
  🏠 🔍 👤
</div>

<input type="file" id="file" hidden>

<script>
const API="https://biggeyes.onrender.com";
let type="photo";

function upload(t){
  type=t;
  document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
  const file=this.files[0];
  const url=URL.createObjectURL(file);

  if(type==="photo"){
    document.getElementById("dp").style.background=`url(${url}) center/cover`;
  }

  const box=document.createElement("div");
  box.className="box item";
  box.style.background=`url(${url}) center/cover`;

  document.getElementById(type).appendChild(box);

  const post=document.createElement("div");
  post.className="post";
  post.innerHTML=file.type.startsWith("image")
    ? `<img src="${url}">`
    : `<video src="${url}" controls></video>`;

  document.getElementById("feed").prepend(post);
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}

fetch(API+"/api/user/profile",{
  headers:{Authorization:"Bearer "+localStorage.getItem("token")}
})
.then(r=>r.json())
.then(d=>{
  if(d.user?.email){
    document.getElementById("user").innerText =
      "@"+d.user.email.split("@")[0];
  }
});
</script>

</body>
</html>
