<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiggEyes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e9edf5;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.logo{
  color:#c2185b;
  font-size:28px;
  font-weight:bold;
}

.profile{
  text-align:center;
  margin-top:20px;
}

.profile-circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#fde6ef;
  border:4px solid #c2185b;
  margin:auto;
}

.user-id{
  color:#c2185b;
  margin:10px 0;
}

.action-row{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#c2185b;
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:20px;
}

.media{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:30px;
}

.box{
  width:80px;
  height:80px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.add{background:#c2185b;}
.disabled{background:#f3b3cc;}

.logout{
  text-align:center;
  margin-top:40px;
}
</style>

</head>

<body>

<script>
if(!localStorage.getItem("token")){
  location.href="login.html";
}
</script>

<div class="header">
  <div class="logo">BiggEyes</div>
</div>

<div class="profile">
  <div class="profile-circle"></div>
  <div class="user-id">@user</div>

  <div class="action-row">
    <button class="btn">BEST</button>
    <button class="btn">VIP</button>
    <button class="btn">FRIENDS</button>
  </div>
</div>

<div class="media">
  <div>
    <h3 style="color:#c2185b">Story</h3>
    <div class="box add">Add</div>
  </div>

  <div>
    <h3 style="color:#c2185b">Photo</h3>
    <div class="box add">Add</div>
  </div>
</div>

<div class="logout">
  <button class="btn" onclick="logout()">Logout</button>
</div>

<script>
function logout(){
  localStorage.clear();
  location.href="login.html";
}
</script>

</body>
</html>
