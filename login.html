<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiggEyes Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fce4ec;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
}
h2{color:#c2185b}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#c2185b;
  color:#fff;
  margin-top:10px;
  font-size:16px;
}

.link{
  color:#c2185b;
  margin-top:10px;
  display:block;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2 id="title">Login</h2>

<input id="username" placeholder="Username (register only)">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="otp" placeholder="OTP (if required)" style="display:none">

<button onclick="submit()">Continue</button>

<div class="link" onclick="toggle()">Create Account</div>

<p id="msg"></p>

</div>

<script>
const API="https://biggeyes.onrender.com";
let mode="login";

function toggle(){
  mode = mode==="login" ? "register" : "login";
  document.getElementById("title").innerText = mode==="login"?"Login":"Register";
  document.getElementById("username").style.display = mode==="register"?"block":"none";
  document.getElementById("otp").style.display="none";
}

function submit(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;
  const user=document.getElementById("username").value;
  const otp=document.getElementById("otp").value;

  if(mode==="register"){
    fetch(API+"/api/auth/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:user,email,password:pass})
    })
    .then(r=>r.json())
    .then(d=>{
      document.getElementById("msg").innerText="OTP sent";
      document.getElementById("otp").style.display="block";
      mode="verify";
    });
  }

  else if(mode==="verify"){
    fetch(API+"/api/auth/verify-otp",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,otp})
    })
    .then(r=>r.json())
    .then(d=>{
      document.getElementById("msg").innerText="Verified! Now login";
      mode="login";
    });
  }

  else{
    fetch(API+"/api/auth/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,password:pass})
    })
    .then(r=>r.json())
    .then(d=>{
      if(d.token){
        localStorage.setItem("token",d.token);
        location.href="home.html";
      }else{
        document.getElementById("msg").innerText="Login failed";
      }
    });
  }
}
</script>

</body>
</html>
